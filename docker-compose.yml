version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestionsalles
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 10s
      retries: 10

  app:
    build: .
    restart: always
    ports:
      - "8888:80"
    environment:
      MYSQLHOST: db
      MYSQLUSER: appuser
      MYSQLPASSWORD: apppass
      MYSQLDATABASE: gestionsalles
      MYSQLPORT: 3306
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
